<VirtualHost *:80>
  ServerName devops.web1.local
  DocumentRoot /srv/html/devops
  ErrorLog /var/log/httpd/devops__error.log
  CustomLog /var/log/httpd/devops_custom.log combined
 <Directory /srv/html/devops>
     Require all granted 
     options -Indexes +FollowSymLinks
 </Directory>
</VirtualHost>

