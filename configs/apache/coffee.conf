<VirtualHost *:80>
  ServerName coffee.web2.local
  Redirect "/" "https://coffee.web2.local"
</VirtualHost>

<VirtualHost *:443>
  ServerName coffee.web2.local
  DocumentRoot /srv/html/coffee
  ErrorLog /var/log/httpd/coffee_error.log
  CustomLog /var/log/httpd/coffee_custom.log combined

  SSLEngine on 
  SSLCertificateFile /etc/pki/tls/certs/coffee.crt
  SSLCertificateKeyFile /etc/pki/tls/private/coffee.key
</VirtualHost> 
 <Directory /srv/html/coffee>
   Require all granted
   options -Indexes +FollowSymLinks
 </Directory>
