<VirtualHost *:80>
  ServerName notes.web2.local
  Redirect "/" "https://notes.web2.local"
</VirtualHost>

<VirtualHost *:443>
  ServerName notes.web2.local
  DocumentRoot /srv/html/notes
  ErrorLog /var/log/httpd/notes_error.log
  CustomLog /var/log/httpd/notes_custom.log combined

  SSLEngine on 
  SSLCertificateFile /etc/pki/tls/certs/coffee.crt
  SSLCertificateKeyFile /etc/pki/tls/private/coffee.key
</VirtualHost> 
 <Directory /srv/html/notes>
   Require all granted
   options -Indexes +FollowSymLinks
 </Directory>
