<VirtualHost *:80>
  ServerName dashboard.web1.local
  DocumentRoot /srv/html/dashboard
  ErrorLog /var/log/httpd/dashboard_error.log
  CustomLog /var/log/httpd/dashboard_custom.log combine
 <Directory /srv/html/dashboard>
      Require all granted
      options -Indexes +FollowSymLinks
 </Directory>
</VirtualHost>
