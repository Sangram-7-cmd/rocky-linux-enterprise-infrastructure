<VirtualHost *:80>
  ServerName portfolio.web1.local
  DocumentRoot /srv/html/portfolio
  ErrorLog /var/log/httpd/portfolie_error.log
  CustomLog /var/log/httpd/portfolie_custom.log combined
 <Directory /srv/html/portfolio>
     Require all granted 
     options -Indexes +FollowSymLinks
 </Directory>
</VirtualHost>

